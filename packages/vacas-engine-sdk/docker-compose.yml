services:
  db_clone:
    # Usando a imagem personalizada que já contém o init.sql e tabelas base
    image: felipetrevenzoli/treis-db:latest
    container_name: treis_clone_db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-felipe}
      POSTGRES_PASSWORD: ${DB_PASS:-dbTreis0303}
      POSTGRES_DB: ${DB_NAME:-apitreis}
    ports:
      - "5432:5432"
    volumes:
      # PERSISTÊNCIA: Seus dados ficam salvos nesta pasta local
      - ./data/postgres:/var/lib/postgresql
      # INIT (Única vez): Scripts de inicialização do Core
      - ./db-core:/docker-entrypoint-initdb.d/
    networks:
      - treis_net
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${DB_USER:-felipe} -d ${DB_NAME:-apitreis}",
        ]
      interval: 5s
      timeout: 5s
      retries: 5

    # Executa scripts SQL da pasta ./db toda vez que o sistema sobe
  db-migrator:
    image: postgres:18-alpine
    depends_on:
      db_clone:
        condition: service_healthy
    volumes:
      - ./db:/scripts
    command: >
      sh -c "until pg_isready -h db_clone -U ${DB_USER:-felipe}; do sleep 2; done;
            export PGPASSWORD=${DB_PASS:-dbTreis0303};
            for f in /scripts/*.sql; do 
              [ -e \"$$f\" ] && psql -h db_clone -U ${DB_USER:-felipe} -d ${DB_NAME:-apitreis} -f \"$$f\"; 
            done"
    networks:
      - treis_net

  api_clone:
    build: .
    profiles: ["api"]
    container_name: treis_clone_api
    restart: always
    ports:
      - "3020:3020"
      - "50051:50051"
    env_file: .env
    depends_on:
      - db_clone
    networks:
      - treis_net

volumes:
  pgdata:

networks:
  treis_net:
    driver: bridge
