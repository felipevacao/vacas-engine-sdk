# ==============================================================================
# MOTOR TREIS - AMBIENTE DE DESENVOLVIMENTO E BUILD
# Use este arquivo para rodar o Core localmente ou buildar as imagens base.
# ==============================================================================
services:
  # Banco de Dados com DNA do Core
  postdb:
    build:
      context: .
      dockerfile: Dockerfile.db
    image: apitreis_db:latest
    container_name: treis_db_local
    restart: unless-stopped
    environment:
      POSTGRES_USER: felipe
      POSTGRES_PASSWORD: dbTreis0303
      POSTGRES_DB: apitreis
    ports:
      - "5433:5432"
    volumes:
      - ../../data:/var/lib/postgresql/
    networks:
      - internal_net

  # Motor API (Modo Desenvolvimento com Hot-Reload)
  # Este serviço NÃO usa a imagem protegida, mas sim a estrutura de fontes local.
  treisapi:
    build:
      context: .
      dockerfile: Dockerfile # O Dockerfile original que faz o build completo
    image: apitreis:latest
    container_name: treis_api_local
    restart: always
    ports:
      - "3015:3002"
      - "50052:50051"
    env_file: .env.production
    environment:
      DB_HOST: postdb
      DB_USER: felipe
      DB_PASS: dbTreis0303
      DB_NAME: apitreis
    depends_on:
      postdb:
        condition: service_healthy
    networks:
      - internal_net

volumes:
  treis_pgdata:

networks:
  internal_net:
    driver: bridge
