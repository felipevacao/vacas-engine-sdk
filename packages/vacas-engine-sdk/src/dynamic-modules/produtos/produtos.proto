syntax = "proto3";

package Produtos;

import "common.proto";
import "google/protobuf/struct.proto";

service produtosService {
  rpc Create (google.protobuf.Struct) returns (common.CommonResponse);
  rpc Get (common.IdRequest) returns (common.CommonResponse);
  rpc Update (google.protobuf.Struct) returns (common.CommonResponse);
  rpc Delete (common.IdRequest) returns (common.CommonResponse);
  rpc List (common.PaginationRequest) returns (common.ListResponse);
  rpc Metadata (common.IdRequest) returns (common.CommonResponse);
}
